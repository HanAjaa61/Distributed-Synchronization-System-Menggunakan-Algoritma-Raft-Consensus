openapi: 3.0.0
info:
  title: Distributed Sync System API
  version: 1.0.0

servers:
  - url: http://localhost:8000

paths:
  /health:
    get:
      summary: Check node health
      responses:
        '200':
          description: Node is alive

  /sync:
    post:
      summary: Sync data across nodes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                key:
                  type: string
                value:
                  type: string
      responses:
        '200':
          description: Data synced successfully

  /leader:
    get:
      summary: Get current leader node
      responses:
        '200':
          description: Leader info

  /raft/status:
    get:
      summary: Get RAFT state
      responses:
        '200':
          description: Node role (leader/follower/candidate)